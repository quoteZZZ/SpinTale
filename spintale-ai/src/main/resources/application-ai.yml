# SpinTale AI profile defaults.
# External capabilities are disabled by default and can be enabled explicitly.

spintale:
  ai:
    enabled: ${SPINTALE_AI_ENABLED:true}
    provider: ${SPINTALE_AI_PROVIDER:openai}
    model: ${SPINTALE_AI_MODEL:gpt-4o-mini}

    openai:
      api-key: ${OPENAI_API_KEY:}
      base-url: ${OPENAI_BASE_URL:https://api.openai.com/v1}
      timeout: ${OPENAI_TIMEOUT:60000}

    openai-compatible:
      enabled: ${OPENAI_COMPATIBLE_ENABLED:false}
      api-key: ${OPENAI_COMPATIBLE_API_KEY:${OPENAI_API_KEY:}}
      base-url: ${OPENAI_COMPATIBLE_BASE_URL:https://api.openai.com/v1}
      model-name: ${OPENAI_COMPATIBLE_MODEL:gpt-4o-mini}
      timeout: ${OPENAI_COMPATIBLE_TIMEOUT:60000}
      temperature: ${OPENAI_COMPATIBLE_TEMPERATURE:0.7}
      max-tokens: ${OPENAI_COMPATIBLE_MAX_TOKENS:2048}

    ollama:
      base-url: ${OLLAMA_BASE_URL:http://localhost:11434}
      model: ${OLLAMA_MODEL:llama3.1}

    local-model:
      enabled: ${SPINTALE_AI_LOCAL_MODEL_ENABLED:false}
      provider: ${SPINTALE_AI_LOCAL_MODEL_PROVIDER:ollama}
      endpoint: ${SPINTALE_AI_LOCAL_MODEL_ENDPOINT:http://localhost:11434}
      model-name: ${SPINTALE_AI_LOCAL_MODEL_NAME:qwen2.5:7b}
      temperature: ${SPINTALE_AI_LOCAL_MODEL_TEMPERATURE:0.7}
      timeout-seconds: ${SPINTALE_AI_LOCAL_MODEL_TIMEOUT_SECONDS:30}

    routing:
      enabled: ${SPINTALE_AI_ROUTING_ENABLED:false}
      complexity-threshold: ${SPINTALE_AI_ROUTING_COMPLEXITY_THRESHOLD:0.6}

    resilience:
      enabled: ${SPINTALE_AI_RESILIENCE_ENABLED:true}

    local-cache:
      enabled: ${SPINTALE_AI_LOCAL_CACHE_ENABLED:false}

    generation:
      enabled: ${SPINTALE_AI_GENERATION_ENABLED:true}

    rag:
      enabled: ${SPINTALE_AI_RAG_ENABLED:false}
      vector-store: ${SPINTALE_AI_RAG_VECTOR_STORE:milvus}
      embedding-model: ${SPINTALE_AI_RAG_EMBEDDING_MODEL:bge-small-en-v1.5}
      max-retrieved-docs: ${SPINTALE_AI_RAG_MAX_RETRIEVED_DOCS:5}
      min-score: ${SPINTALE_AI_RAG_MIN_SCORE:0.5}
      query-rewriting-enabled: ${SPINTALE_AI_RAG_QUERY_REWRITING:false}
      max-segment-size: ${SPINTALE_AI_RAG_MAX_SEGMENT_SIZE:800}
      max-overlap-size: ${SPINTALE_AI_RAG_MAX_OVERLAP_SIZE:120}
      graph:
        enabled: ${SPINTALE_AI_RAG_GRAPH_ENABLED:false}
      milvus:
        uri: ${MILVUS_URI:http://localhost:19530}
        username: ${MILVUS_USERNAME:}
        password: ${MILVUS_PASSWORD:}
        collection-name: ${MILVUS_COLLECTION:spintale_knowledge}

    context:
      max-messages: ${SPINTALE_AI_CONTEXT_MAX_MESSAGES:20}
      memory-retrieval-threshold: ${SPINTALE_AI_MEMORY_RETRIEVAL_THRESHOLD:0.6}
      max-retrieved-memories: ${SPINTALE_AI_MAX_RETRIEVED_MEMORIES:5}
      long-term-memory-enabled: ${SPINTALE_AI_LONG_TERM_MEMORY_ENABLED:true}

    hallucination-detection:
      enabled: ${SPINTALE_AI_HALLUCINATION_ENABLED:true}
      threshold: ${SPINTALE_AI_HALLUCINATION_THRESHOLD:0.5}
      action: ${SPINTALE_AI_HALLUCINATION_ACTION:WARN}

    safety:
      enabled: ${SPINTALE_AI_SAFETY_ENABLED:true}
      level: ${SPINTALE_AI_SAFETY_LEVEL:MODERATE}

    semantic-cache:
      enabled: ${SPINTALE_AI_SEMANTIC_CACHE_ENABLED:false}
      similarity-threshold: ${SPINTALE_AI_SEMANTIC_CACHE_SIMILARITY:0.85}
      ttl-hours: ${SPINTALE_AI_SEMANTIC_CACHE_TTL_HOURS:24}

    experiment:
      enabled: ${SPINTALE_AI_EXPERIMENT_ENABLED:false}

    agent:
      react:
        enabled: ${SPINTALE_AI_AGENT_REACT_ENABLED:true}
        max-iterations: ${SPINTALE_AI_AGENT_REACT_MAX_ITERATIONS:10}
        tool-timeout-ms: ${SPINTALE_AI_AGENT_REACT_TOOL_TIMEOUT_MS:30000}
        loop-threshold: ${SPINTALE_AI_AGENT_REACT_LOOP_THRESHOLD:3}
      coordination:
        enabled: ${SPINTALE_AI_AGENT_COORDINATION_ENABLED:false}

    workflow:
      enabled: ${SPINTALE_AI_WORKFLOW_ENABLED:false}
      target-server: ${TEMPORAL_TARGET:localhost:7233}
      task-queue: ${TEMPORAL_TASK_QUEUE:ai-agent-queue}

    mcp:
      enabled: ${SPINTALE_AI_MCP_ENABLED:false}
      filesystem-base-path: ${SPINTALE_AI_MCP_FILESYSTEM_BASE_PATH:}
      max-file-size-bytes: ${SPINTALE_AI_MCP_MAX_FILE_SIZE_BYTES:1048576}

    tools:
      weather:
        enabled: ${SPINTALE_AI_WEATHER_TOOL_ENABLED:true}
        api-key: ${WEATHER_API_KEY:demo}
        base-url: ${WEATHER_BASE_URL:https://api.openweathermap.org/data/2.5}
