# ============================================================================
# 开发环境配置
# ============================================================================

server:
  port: 8080

spring:
  datasource:
    druid:
      master:
        url: jdbc:mysql://localhost:3306/SpinTale_dev?useUnicode=true&characterEncoding=utf8&zeroDateTimeBehavior=convertToNull&useSSL=false&serverTimezone=GMT%2B8
        username: root
        password: ${DB_PASSWORD:}
      slave:
        enabled: false

  data:
    redis:
      host: localhost
      port: 6379
      database: 1
      password: ${REDIS_PASSWORD:}

logging:
  level:
    com.spintale: debug
    org.springframework: info
  file:
    name: logs/spintale-dev.log

token:
  secret: ${TOKEN_SECRET:dev-secret-key-change-in-production}
  expireTime: 480

spintale:
  profile: D:/SpinTale/uploadPath_dev
  captchaEnabled: false
  addressEnabled: true
  weatherEnabled: false
  eventEnabled: false

spintale.ai:
  enabled: true
  provider: openai-compatible
  model: deepseek-v4-flash
  openai-compatible:
    enabled: true
    api-key: ${DEEPSEEK_API_KEY:}
    base-url: https://api.deepseek.com/v1
    model-name: deepseek-v4-flash
  telemetry:
    enabled: false
  resilience:
    circuit-breaker:
      enabled: false
